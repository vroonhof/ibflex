name: Bug
description: Something else is wrong (not a parser error or missing field).
labels: [bug, triage]
body:
  - type: input
    id: version
    attributes:
      label: ibflex2 version
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: Minimal code or steps that trigger the bug.
    validations:
      required: true
