name: CHANGELOG

on:
  pull_request:
    branches: [master, main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  enforce:
    name: CHANGELOG entry required
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip-changelog') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify CHANGELOG.md updated when ibflex/ changes
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Files this PR changed.
          changed=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          echo "Changed files:"
          echo "$changed"
          # If no source files in ibflex/ changed, no CHANGELOG required.
          if ! echo "$changed" | grep -qE '^ibflex/.*\.py$'; then
            echo "No ibflex/*.py changes; CHANGELOG not required."
            exit 0
          fi
          if echo "$changed" | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was updated."
            exit 0
          fi
          echo "::error::ibflex/ changed but CHANGELOG.md was not updated."
          echo "Add an entry under 'Unreleased' or apply the 'skip-changelog' label."
          exit 1
